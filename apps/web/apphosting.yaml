runConfig:
  cpu: 1
  memoryMiB: 512
  concurrency: 80

env:
  - variable: METRA_API_TOKEN
    secret: metra-api-token
    availability:
      - RUNTIME
  - variable: CTA_TRAIN_TRACKER_KEY
    secret: cta-train-tracker-key
    availability:
      - RUNTIME
  - variable: NEXT_PUBLIC_FUNCTIONS_BASE_URL
    value: https://us-central1-chicago-transit-tracker.cloudfunctions.net
