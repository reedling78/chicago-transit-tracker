name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  ci:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Run tests
        run: npm test
        env:
          TZ: America/Chicago

# Deployment is handled automatically by Firebase App Hosting.
# Push to main triggers a build and deploy via GitHub integration.
# Secrets (METRA_API_TOKEN) are managed in apphosting.yaml via Cloud Secret Manager.
